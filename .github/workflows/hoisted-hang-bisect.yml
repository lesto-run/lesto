# ⚠️ RESULT: VACUOUS (2026-07-04, run 28719740861) — this bisect came back GREEN at ALL 7 SHAs, INCLUDING
# `6d65d49` (labeled the "expected-RED control" below — that label is FALSIFIED). It proves nothing about a
# fix commit: the method uses LOCAL packs (`packLestoClosure`, `overrides`-pinned `file:` tarballs), which
# are STRUCTURALLY BLIND to this defect (only the real npm-resolved published closure reproduces it). So
# "no source red-anchor exists" is one reading; "this methodology cannot see the defect" is equally consistent
# — indistinguishable from all-green. Kept only as the record that local-pack bisection is blind here; the
# faithful oracle is the verdaccio check (L-513dd8a6). Do NOT trust a green/red from this workflow.
#
# DISPATCH-ONLY bisect for L-3daa1173 (the chief-architect's required run): NAME the commit in
# `6d65d49..HEAD` that fixed the published-0.1.2 hoisted-Linux `lesto dev` first-request defect
# (undici-`fetch`/`Sec-Fetch-Site` request gets no headers while curl gets a 200), and MINT the
# code-anchored RED (the pre-fix tree) that re-anchors the release gate (L-e6a86c59) and demotes the
# synthetic negative-control (L-8aa4315b) to a durable fallback.
#
# HOW each matrix cell tests a historical PRODUCT tree with the CURRENT undici harness (the client that
# actually catches this defect — curl is a proven FALSE ORACLE here, run 28718939651): check out main,
# overlay the candidate SHA's `packages/**` (its product src + its create-lesto), then RESTORE only
# `packages/e2e` to HEAD so the pack/scaffold/undici-`waitForServer` DRIVER stays current while every
# product package under test is the candidate's. `bun install` (NOT --frozen: the overlaid package.jsons
# won't match HEAD's lockfile) re-resolves, then the existing preflight packs that tree → hoisted install
# → boot dev → undici first-`GET /`. RED (waitForServer 120s timeout, server booted) == pre-fix; GREEN ==
# fixed. Deterministic 3/3 was already shown, so n=1 per SHA locates the flip; the parent of the flip is
# the anchor. 6d65d49 (== the 0.1.2 publish tree) is the expected-RED control; a10926d (HEAD) the GREEN.
name: Hoisted-hang bisect (L-3daa1173 — name the fix commit + mint the RED anchor)

on:
  workflow_dispatch:

concurrency:
  group: hoisted-hang-bisect-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  bisect:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        # Commit-date order across the candidate range. 6d65d49 = 0.1.2 publish tree (expect RED);
        # a10926d = HEAD (expect GREEN). The product-touching commits between are the flip candidates:
        # e7d505e (serveWithGracefulShutdown) and the RUM-preflight cluster (dca8c9a/9b8f183/95bab75/dcfe4fc).
        sha:
          - "6d65d49"
          - "e7d505e"
          - "dca8c9a"
          - "9b8f183"
          - "95bab75"
          - "dcfe4fc"
          - "a10926d"
    name: ${{ matrix.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so any candidate SHA is checkoutable for the overlay below.
          fetch-depth: 0

      - name: Overlay the candidate product tree, keep the e2e driver at HEAD
        env:
          SHA: ${{ matrix.sha }}
        run: |
          set -euo pipefail
          # Move every package's tree to the candidate (product src + its create-lesto scaffolder)...
          git checkout "$SHA" -- packages
          # ...then restore ONLY the test driver (pack/scaffold/undici-waitForServer harness) to HEAD, so
          # the CLIENT is constant and only the PRODUCT under test varies. dev-harness.ts sends the exact
          # `Sec-Fetch-Site: same-origin` + AbortSignal fetch that discriminates this defect.
          git checkout HEAD -- packages/e2e
          echo "Overlaid product tree at $SHA; e2e driver pinned to HEAD:"
          git --no-pager diff --stat HEAD -- packages | tail -1

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # NON-frozen: the overlaid candidate package.jsons won't match HEAD's lockfile, so re-resolve.
      - name: Install dependencies (non-frozen — mixed tree)
        run: bun install

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      # The current-tree preflight, now packing the OVERLAID candidate product. RED here == this tree
      # reproduces the undici first-GET defect; GREEN == it's fixed at this SHA.
      - name: Preflight against the overlaid ${{ matrix.sha }} tree
        working-directory: packages/e2e
        run: bun run test:scaffold-hoisted-preflight

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hoisted-hang-bisect-${{ matrix.sha }}
          path: packages/e2e/test-results/**
          retention-days: 14
          if-no-files-found: warn
