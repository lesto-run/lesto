# Deploy the Alchemy-managed example graphs to Cloudflare (ADR 0044 Inc3).
#
# Makes gallery-as-QA-gate's "it deploys" leg MECHANICALLY CHECKABLE: instead of a human
# running `bun alchemy.run.ts` by hand, this job deploys the migrated multi-resource examples
# (the cooperating OpenAuth issuer + Lesto MCP Resource Server, ADR 0039) on every push to main.
#
# Auth is the ADR 0044 D4 pair, from repo secrets — never an interactive `alchemy login`:
#   - CLOUDFLARE_API_TOKEN — the account Alchemy deploys into (and where the D5 state DO lives);
#   - ALCHEMY_STATE_TOKEN  — the ONE shared secret the CloudflareStateStore encrypts state under,
#     identical to every other adopting environment (a per-env value makes the shared state
#     un-decryptable by a second machine — D4).
# Both are required. On a fork / a PR without secrets the job SKIPS OUT LOUD (a ::notice::), it
# does not fail — a missing secret is an expected non-deploy, not a broken build.
#
# Stage is pinned to `prod` (ADR 0044 D2), so the resource names are stable across pushes and the
# CI stage never collides with a developer's `$USER` stage or a teammate's.

name: Deploy examples (Alchemy)

on:
  push:
    branches: [main]
  workflow_dispatch:

# A newer push supersedes an in-flight deploy of the same ref (never two deploys racing on one stage).
concurrency:
  group: deploy-examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Secrets are not available to a job-level `if:`, so gate here: if either D4 secret is
      # absent (a fork / an untrusted PR), emit a notice and skip the deploy steps — out loud,
      # not failed.
      - name: Check deploy secrets are present
        id: guard
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$ALCHEMY_STATE_TOKEN" ]; then
            echo "::notice title=Alchemy deploy skipped::CLOUDFLARE_API_TOKEN / ALCHEMY_STATE_TOKEN not set (expected on forks/PRs) — skipping the example deploy."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy mcp-auth-openauth
        if: steps.guard.outputs.deploy == 'true'
        working-directory: examples/mcp-auth-openauth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          ALCHEMY_STAGE: prod
        run: bun alchemy.run.ts

      - name: Deploy mcp-ops-console
        if: steps.guard.outputs.deploy == 'true'
        working-directory: examples/mcp-ops-console
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          ALCHEMY_STAGE: prod
        run: bun alchemy.run.ts

      # The benchmark edge worker (ADR 0044 Inc2) — Alchemy adopts the existing `lesto-bench-edge`
      # resource. `wrangler.jsonc` stays as the local `wrangler dev` config + the drift-guard source
      # `alchemy.run.ts` reads its runtime settings from.
      - name: Deploy benchmark edge worker
        if: steps.guard.outputs.deploy == 'true'
        working-directory: benchmarks/apps/lesto
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ALCHEMY_STATE_TOKEN: ${{ secrets.ALCHEMY_STATE_TOKEN }}
          ALCHEMY_STAGE: prod
        run: bun alchemy.run.ts
