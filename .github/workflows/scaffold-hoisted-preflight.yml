# ✅ RESOLVED (2026-07-05, b08c770, L-513dd8a6): the "defect" discussed below was REFUTED — the harness
# probed port 4190 (WHATWG fetch restricted-ports list; undici AND browsers refuse it pre-connect with
# "bad port"), never a product or closure issue. There was no hang, local packs were never "blind", and
# no verdaccio harness is needed. Read the correction block and the narrative below as HISTORICAL record;
# this workflow's standing value is install/build + hoisted-layout coverage of the CURRENT tree, with dev
# ports guarded by assertFetchablePort (packages/e2e/dev-harness.ts).
#
# ⚠️ CORRECTION (2026-07-04, L-3daa1173): this preflight is STRUCTURALLY BLIND to the L-27285131 defect —
# it would NOT have caught it. The defect only reproduces on the REAL npm-resolved published closure under
# a Node undici `fetch()` client; this is a LOCAL PACK, and every local pack GREENS under undici (incl. of
# published-0.1.2's byte-identical source). Keep it for install/build + hoisted-layout coverage; the
# faithful published-closure dev-boot check (verdaccio) is the re-scoped L-513dd8a6 deliverable. The
# "would have caught it" / "gate" language below is superseded — read it as install-coverage, not the gate.
#
# The MUTABLE-TREE HOISTED dev-boot preflight (L-513dd8a6) — its OWN workflow, nightly + on-demand.
#
# This is the pre-publish CANARY that would have caught L-27285131 if run before the publish (it is a
# nightly/dispatch job, NOT yet wired into release.yml as a blocking gate — see PRE-PUBLISH below). That defect —
# published-0.1.2 `lesto dev` HANGS the first `GET /` under the HOISTED linker on CI Linux (a true
# hang, confirmed at 300s; the child stays alive + bound) — was only discoverable POST-publish,
# because the only leg that booted dev under hoisted (leg (a) of scaffold-real-install) runs the
# IMMUTABLE PUBLISHED closure, which has no repo-side fix and can only be SKIPPED. Its sibling leg (b)
# boots the CURRENT tree but under the ISOLATED linker, which does NOT reproduce the hang.
#
# The uncovered quadrant — CURRENT tree × HOISTED linker — is exactly what a real
# `bun create lesto && cd app && bun install && lesto dev` user gets, because HOISTED is bun's
# standalone-scaffold DEFAULT. This job fills it: it packs the current tree to tarballs, installs with
# `bun install --linker=hoisted`, and boots `lesto dev` asserting the first `GET /` answers — so the
# hang can go RED on a FIXABLE target (published dev code == the tree) instead of only against the
# immutable published leg. This is the standing pre-publish canary for that whole failure class.
#
# PRE-PUBLISH: the release/publish flow SHOULD run `bun run test:scaffold-hoisted-preflight` before it
# cuts a version — a red here is a real default-path dev hang for Linux users, not flake. Wiring this as
# an automatic blocking `needs:` job in release.yml is a tracked follow-up (it must land AFTER the fix,
# or it would deadlock the very 0.1.3 release that ships the fix). Also unconfirmed until dispatched on
# ubuntu-latest: that the current-tree path reproduces the hang the immutable published closure showed.
#
# Deliberately a SEPARATE workflow with its OWN concurrency group (same reasoning as
# `scaffold-real-install.yml` / `benchmarks.yml`): a `schedule`/`workflow_dispatch` on ci.yml's shared
# `on:` would drop the run into ci's `ci-${{ github.ref }}` group, where the nightly and a concurrent
# push-to-main cancel each other (this repo pushes to main around the clock). Its own file + own
# concurrency group keeps both signals intact.
name: Scaffold hoisted-preflight (dev-boot)

on:
  workflow_dispatch:
  schedule:
    # Nightly, 07:30 UTC — offset from scaffold-real-install's 07:00 so the two heavy install jobs
    # don't contend for runners; a standing canary on the default hoisted dev-boot path, not a PR gate.
    - cron: "30 7 * * *"

concurrency:
  group: scaffold-hoisted-preflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scaffold-hoisted-preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      # The app runs under bun/bunx; Node is here only for the playwright shim, matching the runner
      # baseline the other e2e jobs ride. Pinned so a runner-image node bump can't drift this canary.
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      # Pack the current tree → scaffold → `bun install --linker=hoisted` → build → boot `lesto dev`
      # and gate on the first `GET /` (bounded 120s so the hang reds fast). `--workers=1` (in the
      # test:scaffold-hoisted-preflight script) keeps the single serial group from oversubscribing.
      - name: Current-tree HOISTED dev-boot preflight (the L-513dd8a6 gate)
        working-directory: packages/e2e
        run: bun run test:scaffold-hoisted-preflight

      # On failure, keep Playwright's trace/screenshot/error-context so the hang (or a hydration
      # failure) is debuggable from the artifact without a re-run. The dev server's own boot output is
      # captured into the test's error message by `spawnDev` in the spec — this is the browser-side half.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scaffold-hoisted-preflight-results
          path: packages/e2e/test-results/**
          retention-days: 14
          if-no-files-found: warn
