# DISPATCH-ONLY diagnostic for L-3daa1173 — is the L-27285131 hoisted-Linux `lesto dev` first-`GET /`
# HANG (a) still reproducing on the IMMUTABLE published closure, and (b) gone on the CURRENT tree at
# HEAD — measured at n>=3 so a single green/red can't masquerade as the trend. Two matrix legs:
#
#   • published    — `bunx create-lesto@<version>` (default 0.1.2) → `bun install --linker=hoisted` →
#                    build → boot `lesto dev` → shell-level first-`GET /` probe. This is the EXACT
#                    immutable artifact a `npm create lesto` user installs; there is no repo-side fix
#                    (it can only be re-verified across versions), so it is the frozen RED reference.
#   • current-tree — the existing `test:scaffold-hoisted-preflight` spec: packs the CURRENT `@lesto/*`
#                    closure to tarballs, hoisted-installs, builds, boots `lesto dev`, gates the first
#                    `GET /`. Runs against the dispatched ref (dispatch on the SHA you want to test).
#
# Decision tree (L-3daa1173): published RED at n>=3 + current-tree GREEN at n>=3 == "a fix landed since
# 0.1.2" (branch a → bisect the repo to the fix commit, its PARENT is the code-anchored RED). published
# no longer RED == the original n=1 was flaky/environmental (branch b → downgrade). published RED but
# current-tree cannot be made RED == a test-FIDELITY gap in the preflight (branch c → L-8aa4315b).
#
# Deliberately its OWN dispatch-only workflow with a NON-cancelling concurrency group: n>=3 is the whole
# point, so — unlike `scaffold-hoisted-preflight.yml` (ref-keyed, cancel-in-progress) — nothing here may
# cancel a sibling attempt. Reusable: bump `version` to 0.1.3 to VERIFY the fix un-skips leg (a) cleanly.
name: Hoisted-hang characterization probe (L-3daa1173)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published create-lesto version to probe on the immutable leg"
        default: "0.1.2"
        required: true

# Every run gets its own group so the n>=3 matrix attempts never cancel each other (see header).
concurrency:
  group: hoisted-hang-probe-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    # Bounds a single attempt well past the 120s first-GET deadline + install/build, under any hang.
    timeout-minutes: 20
    strategy:
      # n>=3 per leg AND independent legs: one attempt's red must not cancel the rest, or the trend
      # (the entire reason this exists) is lost.
      fail-fast: false
      matrix:
        leg: [published, current-tree]
        attempt: [1, 2, 3]
    name: ${{ matrix.leg }} #${{ matrix.attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      # Node is only needed for the current-tree leg's Playwright shim; pinned to match the other e2e jobs.
      - name: Set up Node 22
        if: matrix.leg == 'current-tree'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── current-tree leg: the existing preflight spec, verbatim (packs HEAD → hoisted-install → boot → first GET) ──
      - name: Install dependencies
        if: matrix.leg == 'current-tree'
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        if: matrix.leg == 'current-tree'
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Current-tree HOISTED dev-boot preflight (test:scaffold-hoisted-preflight)
        if: matrix.leg == 'current-tree'
        working-directory: packages/e2e
        run: bun run test:scaffold-hoisted-preflight

      # ── published leg: the IMMUTABLE artifact, shell-level first-GET probe (no repo-side fix exists) ──
      - name: Published hoisted `lesto dev` first-GET probe
        if: matrix.leg == 'published'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          work="$(mktemp -d)"
          cd "$work"

          echo "::group::scaffold create-lesto@${VERSION} (the immutable published bin)"
          bunx "create-lesto@${VERSION}" pub-app --yes --no-install --no-git
          cd pub-app
          echo "::endgroup::"

          echo "::group::bun install --linker=hoisted (the DEFAULT standalone-scaffold layout)"
          bun install --linker=hoisted
          echo "::endgroup::"

          echo "::group::lesto build (Preact island client via the app's OWN installed cli)"
          bun ./node_modules/.bin/lesto build
          echo "::endgroup::"

          echo "::group::boot lesto dev + first GET"
          # Mirror packages/e2e/dev-harness.ts `waitForServer`: ANY HTTP response == up, a 2s per-attempt
          # bound (so a wedged acceptor that never sends headers keeps timing out rather than blocking
          # forever), a 120s overall deadline. A hoisted-on-Linux hang stays ALIVE + bound but never
          # answers → the deadline trips → RED. `--port` is how `lesto dev` takes its port (dev-harness.ts).
          bun ./node_modules/.bin/lesto dev --port 4190 > dev.log 2>&1 &
          dev_pid=$!

          answered=0
          deadline=$(( SECONDS + 120 ))
          while [ "$SECONDS" -lt "$deadline" ]; do
            if ! kill -0 "$dev_pid" 2>/dev/null; then
              echo "dev exited before answering the first GET"
              break
            fi
            if curl -s -o /dev/null --max-time 2 "http://127.0.0.1:4190/"; then
              answered=1
              break
            fi
            sleep 0.5
          done
          echo "::endgroup::"

          echo "--- dev.log (tail) ---"
          tail -n 40 dev.log || true
          kill "$dev_pid" 2>/dev/null || true

          if [ "$answered" -eq 1 ]; then
            echo "RESULT: published ${VERSION} hoisted dev ANSWERED the first GET (no hang on this attempt)"
          else
            echo "RESULT: published ${VERSION} hoisted dev HUNG — first GET never answered within 120s"
            echo "        (L-27285131 reproduces on the immutable published closure)"
            exit 1
          fi
