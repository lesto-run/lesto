# DISPATCH-ONLY mechanism-isolation for L-3daa1173 (chief-architect required run #1): on the REAL
# published-0.1.2 npm closure (the only thing that reproduces the RED), fire DIFFERENT client shapes as
# the COLD first request and see which hang — to discriminate the three root-cause candidates that have
# OPPOSITE dispositions:
#   RC3 (harness artifact, users fine): the hang is undici keep-alive-pool poisoning on the 2s-abort of a
#        slow COLD first request. Predicts: `fetch-noabort` (single fetch, no 2s abort) and `http-close`
#        (fresh socket, Connection: close) ANSWER (maybe slowly); only the 2s-abort loop reds.
#   RC1/RC2 (real published-closure/transitive defect, could bite 0.1.3): the server genuinely never
#        answers an undici request. Predicts: EVERY undici shape reds regardless of abort/pool; only curl
#        (and a fresh browser) escape.
# Each job boots its OWN fresh 0.1.2 dev and fires ONE client variant FIRST (no pre-warming), then dumps
# the server's own http.access log so we see per-variant whether the request reached the handler.
name: Hoisted-hang mechanism-isolation (L-3daa1173 — client-shape matrix)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Published create-lesto version to probe"
        default: "0.1.2"
        required: true

concurrency:
  group: hoisted-hang-mechanism-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # curl               — lenient control (greened before): fresh conn each poll, no Sec-Fetch, no abort.
        # fetch-waitforserver — the EXACT waitForServer client (pooled undici + Sec-Fetch + 2s abort loop) = the RED repro.
        # fetch-noheader      — same loop, WITHOUT Sec-Fetch-Site → isolates the header as trigger.
        # fetch-noabort       — single undici fetch, Sec-Fetch, NO 2s abort, wait 60s → RC3: slow-cold vs true hang.
        # http-close          — node:http fresh socket (agent:false, Connection: close), Sec-Fetch, 60s → isolates the undici pool.
        mode: [curl, fetch-waitforserver, fetch-noheader, fetch-noabort, http-close]
    name: ${{ matrix.mode }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Scaffold + hoisted-install + build the published closure, boot dev
        id: boot
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          work="$(mktemp -d)"
          echo "WORK=$work" >> "$GITHUB_ENV"
          cd "$work"
          echo "::group::scaffold create-lesto@${VERSION}"
          bunx "create-lesto@${VERSION}" app --yes --no-install --no-git
          cd app
          echo "::endgroup::"
          echo "::group::bun install --linker=hoisted"
          bun install --linker=hoisted
          echo "::endgroup::"
          echo "::group::lesto build"
          bun ./node_modules/.bin/lesto build
          echo "::endgroup::"
          echo "APP=$work/app" >> "$GITHUB_ENV"
          # Boot dev; wait ONLY for the bound announcement (NOT an HTTP request — that would pre-warm the
          # cold first request the probe must own). "dev server on" prints at listen(), before any request.
          bun ./node_modules/.bin/lesto dev --port 4190 > "$work/app/dev.log" 2>&1 &
          echo "DEV_PID=$!" >> "$GITHUB_ENV"
          for _ in $(seq 1 60); do
            if grep -q "dev server on" "$work/app/dev.log" 2>/dev/null; then echo "bound"; break; fi
            sleep 0.5
          done

      - name: Write the client probe
        run: |
          cat > "$RUNNER_TEMP/probe.mjs" <<'EOF'
          import http from "node:http";
          const url = "http://127.0.0.1:4190/";
          const mode = process.env.PROBE_MODE;
          const SEC = { "Sec-Fetch-Site": "same-origin" };

          // Capture `error.cause` (undici hides the real reason there — ECONNRESET / UND_ERR_SOCKET /
          // HPE_INVALID_* / ECONNREFUSED) — it disambiguates "connection-level" from "server framed a
          // response strict undici rejects" (which would re-open the user-impact question). L-3daa1173.
          const causeOf = (e) => e?.cause?.code ?? (e?.cause ? String(e.cause).slice(0, 160) : String(e).slice(0, 160));
          async function loop(headers, abortMs) {
            const deadline = Date.now() + 60000;
            let attempts = 0, lastCause = "";
            while (Date.now() < deadline) {
              attempts++;
              try {
                const r = await fetch(url, { headers, signal: AbortSignal.timeout(abortMs) });
                return { ok: true, status: r.status, attempts };
              } catch (e) { lastCause = causeOf(e); }
              await new Promise((r) => setTimeout(r, 200));
            }
            return { ok: false, attempts, note: "60s deadline, never answered", lastCause };
          }
          async function single(headers) {
            const t0 = Date.now();
            try {
              const r = await fetch(url, { headers, signal: AbortSignal.timeout(60000) });
              return { ok: true, status: r.status, ms: Date.now() - t0 };
            } catch (e) { return { ok: false, ms: Date.now() - t0, err: String(e).slice(0, 140), cause: causeOf(e) }; }
          }
          function httpClose(headers) {
            return new Promise((resolve) => {
              const t0 = Date.now();
              const req = http.request(url, { agent: false, headers: { ...headers, Connection: "close" } }, (res) => {
                res.resume();
                resolve({ ok: true, status: res.statusCode, ms: Date.now() - t0 });
              });
              req.setTimeout(60000, () => { req.destroy(); resolve({ ok: false, ms: Date.now() - t0, err: "socket 60s timeout" }); });
              req.on("error", (e) => resolve({ ok: false, ms: Date.now() - t0, err: String(e).slice(0, 140) }));
              req.end();
            });
          }

          let result;
          if (mode === "fetch-waitforserver") result = await loop(SEC, 2000);
          else if (mode === "fetch-noheader") result = await loop({}, 2000);
          else if (mode === "fetch-noabort") result = await single(SEC);
          else if (mode === "http-close") result = await httpClose(SEC);
          else result = { skip: "mode handled by curl step" };
          console.log("PROBE_RESULT " + mode + " " + JSON.stringify(result));
          process.exit(result.ok ? 0 : 1);
          EOF

      - name: Fire the cold-first ${{ matrix.mode }} probe
        id: fire
        env:
          PROBE_MODE: ${{ matrix.mode }}
        run: |
          # `set +e` is LOAD-BEARING: GHA's default shell is `bash -e {0}`, so a non-zero `node` exit (a
          # red probe — which is DATA here, not a failure) would kill this step BEFORE the http.access dump
          # + `.cause` print below. That bug lost the server-side evidence on the first run (28720092379).
          set +e
          if [ "$PROBE_MODE" = "curl" ]; then
            if curl -sS -o /dev/null -w "curl HTTP %{http_code} in %{time_total}s\n" --max-time 60 "http://127.0.0.1:4190/"; then
              echo "PROBE_RESULT curl {\"ok\":true}"; rc=0
            else echo "PROBE_RESULT curl {\"ok\":false}"; rc=1; fi
          else
            node "$RUNNER_TEMP/probe.mjs"; rc=$?
          fi
          echo "--- dev.log http.access lines (did the server log THIS variant's request?) ---"
          grep -a "http.access" "$APP/dev.log" || echo "(no http.access line — server never reached its handler for this client)"
          echo "--- dev.log tail ---"; tail -n 15 "$APP/dev.log" || true
          kill "$DEV_PID" 2>/dev/null || true
          # Report but never fail the JOB on a red probe — a red is DATA here, not a build break; we read
          # the per-mode conclusions from the logs, not the job's pass/fail.
          echo "probe rc=$rc (informational; job stays green so the matrix always completes)"
