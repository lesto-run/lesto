name: live-capstone-e2e

# The Tier-4 v1 capstone's headless-browser REGRESSION GATE (ADR 0042, `L-2e410682`).
#
# The bun-run acceptance gate in `ci.yml` (`live-capstone-acceptance`) drives the server/wire half over
# real Postgres logical replication, but bun has no OPFS / Web Locks / BroadcastChannel — so it cannot
# reach the durable-store + cross-tab guarantees. The first real-browser run found a P0 it structurally
# could not catch (the durable OPFS store booted on the main thread, DOA in every browser — Inc9,
# `L-565a4b33`). This job is the missing browser guard: it boots the REAL built bundle in a REAL
# Chromium via Playwright and asserts durable first paint, offline drain, and cross-tab failover — the
# test that would have caught the Inc9 class.
#
# It needs NO Postgres service — the capstone's dev SQLite-poll source drives all four checklist steps
# (they live above the change source), so this is a plain build-and-serve run. The spec
# (`packages/e2e/live-capstone-opfs.spec.ts`) owns its own build + server in `beforeAll`; the workflow
# installs deps + the chromium browser and runs it. (The shared `packages/e2e/playwright.config.ts` also
# boots its unused island-fixture webServer on :4180 — harmless, as it does for the sibling e2e specs.)
#
# WHY a standalone workflow and NOT a job in `ci.yml` (which is where every OTHER blocking gate lives,
# including the 7 sibling browser e2e jobs): at authoring time `ci.yml` AND `packages/e2e/package.json`
# were both held by a concurrent session in this shared worktree, so editing them risked a conflict with
# the daemon's per-path commits. This is the TEMPORARY shape. Clean end-state (follow-up filed): fold
# this into `ci.yml` as a `page-swap`-shaped job + add a `test:live-capstone` script to
# `packages/e2e/package.json`, then delete this file — do it once the holding session clears.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: live-capstone-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  capstone-browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      # The spec builds the capstone client bundle and serves it (dev SQLite poll, no Postgres) itself,
      # then drives it in Chromium: durable OPFS first paint, offline write + drain, cross-tab failover.
      - name: Capstone OPFS + cross-tab browser e2e (dev SQLite-poll path, no Postgres)
        working-directory: packages/e2e
        run: bunx playwright test live-capstone-opfs.spec.ts

      # A first-of-its-kind browser gate here: on a red run, keep the traces/screenshots so it can be
      # debugged without a local repro.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: capstone-e2e-results
          path: packages/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore
