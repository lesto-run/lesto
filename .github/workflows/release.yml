# Release: version + publish the public @volo/* surface via Changesets.
#
# When armed, a push to main opens (or updates) a "Version Packages" PR that
# applies the queued changesets; merging that PR publishes the bumped packages to
# npm with provenance.
#
# Dormant by default: the whole job is gated on the `RELEASE_ENABLED` repository
# variable (Settings → Variables). Until it is set to `true` the job is SKIPPED —
# no wasted CI, nothing runs. Arm it only after the public surface is de-privatized
# and an `NPM_TOKEN` secret exists (see RELEASING.md).
name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write # create the version PR / tags
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    # The real switch: the job is skipped entirely unless RELEASE_ENABLED=true,
    # so it costs nothing on a normal push and cannot publish before the team arms it.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      - name: Version or publish
        uses: changesets/action@v1
        with:
          version: bun run version
          publish: bun run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
