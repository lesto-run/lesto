# Release: publish the public @lesto/* surface to npm via TRUSTED PUBLISHING (OIDC).
#
# No NPM_TOKEN. The workflow authenticates to npm through GitHub's OIDC identity, matched
# against each package's "trusted publisher" config on npmjs.com
# (owner = lesto-run, repo = lesto, workflow = release.yml). Provenance is automatic.
#
# Requirements (npm docs): npm CLI >= 11.5.1 (upgraded below — the Node-22 bundled npm is
# too old) and Node >= 22.14. EVERY published package must have its trusted publisher
# configured first (npmjs.com → package → Settings → Trusted publishing), or it 403s.
#
# Publishing runs `bun run release` (scripts/publish.mjs): `bun pm pack` rewrites the
# `workspace:*` protocol (npm does not), then `npm publish` uploads each tarball over OIDC.
#
# Dormant until the RELEASE_ENABLED repo variable is `true`. Trigger EXPLICITLY from the Actions
# tab ("Run workflow" → workflow_dispatch); there is deliberately NO `push` trigger. RELEASE_ENABLED
# is now a DEFENSE-IN-DEPTH privilege gate: `workflow_dispatch` lets anyone with Actions-write fire a
# run, but a repo *variable* is admin-gated — so nothing publishes unless an admin has opened the
# publish window. Arm it, dispatch, then set it back to `false` (safe-at-rest). NOTE: the workflow
# checks out ORIGIN at the given ref — confirm `git rev-list --count origin/main..HEAD == 0` and
# dispatch with `--ref <exact-sha>` (not `--ref main`), or CI silently builds a stale tree.
#
# GREEN-CI GATE (L-69e905de): the first step below refuses to publish unless the `CI` workflow
# concluded `success` for the exact dispatched commit — so a red or not-yet-built tree fails fast
# without uploading a tarball. Dispatch only AFTER CI has gone green for the release commit.
name: Release

on:
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # OIDC trusted publishing + provenance
  actions: read # read the CI workflow's conclusion for the commit (green-CI gate below)

jobs:
  release:
    # Skipped entirely unless RELEASE_ENABLED=true, so it costs nothing on a normal push
    # and cannot publish before the surface is armed.
    if: ${{ vars.RELEASE_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Green-CI precondition (L-69e905de). This workflow is dispatch-triggered and has NO
      # inherent tie to CI, so without this gate it will publish from a RED tree just as
      # readily as a green one — the 0.1.4 wave did (benignly: format drift in test files
      # excluded from every tarball, but the MECHANISM would ship genuinely broken code).
      # npm is immutable, so publishing is unrecoverable — require the `CI` workflow to have
      # concluded `success` for the EXACT commit being published before any tarball uploads.
      # `--event push` pins it to the push-to-main run (not a stale pull_request run that may
      # share the head SHA), so the gate trusts exactly the run that gates main.
      # Fail-CLOSED: no run found, still in progress, or any non-success conclusion all abort.
      # GITHUB_SHA is the tip of the dispatched ref (we dispatch --ref main only after
      # confirming origin==sha per RELEASING.md), and CI runs on push to main, so a green run
      # for this SHA exists once CI has finished. Reads GITHUB_SHA (runner-set, not caller
      # input) via env; needs the `actions: read` permission added above.
      - name: Require green CI for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Checking CI conclusion for $GITHUB_SHA…"
          result="$(gh run list --workflow=ci.yml --event push --commit "$GITHUB_SHA" --limit 1 \
            --json status,conclusion,databaseId \
            --jq 'if length == 0 then "none none 0" else "\(.[0].status) \(.[0].conclusion) \(.[0].databaseId)" end')"
          status="$(printf '%s' "$result" | cut -d' ' -f1)"
          conclusion="$(printf '%s' "$result" | cut -d' ' -f2)"
          run_id="$(printf '%s' "$result" | cut -d' ' -f3)"
          echo "Latest CI run for $GITHUB_SHA: status=$status conclusion=$conclusion (run $run_id)"
          if [ "$status" = "none" ]; then
            echo "::error::No CI run found for $GITHUB_SHA — refusing to publish an unverified commit. Push it, let CI run to green, then re-dispatch the release."
            exit 1
          fi
          if [ "$status" != "completed" ] || [ "$conclusion" != "success" ]; then
            echo "::error::CI for $GITHUB_SHA is not green (status=$status conclusion=$conclusion). Refusing to publish. Wait for CI to conclude success, then re-dispatch."
            exit 1
          fi
          echo "CI is green for $GITHUB_SHA — proceeding to publish."

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Trusted publishing needs npm >= 11.5.1; the Node-22 bundled npm (~10.9) is too old.
      # Pinned (not @latest): npm@latest regressed provenance with `Cannot find module 'sigstore'`
      # (libnpmpublish/provenance.js) under NPM_CONFIG_PROVENANCE — 11.5.1 ships an intact sigstore.
      - run: npm install -g npm@11.5.1

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - run: bun install --frozen-lockfile

      # No token — npm authenticates via OIDC against each package's trusted publisher.
      # Provenance is automatic under trusted publishing; NPM_CONFIG_PROVENANCE makes it explicit.
      - name: Publish to npm
        run: bun run release
        env:
          NPM_CONFIG_PROVENANCE: "true"
