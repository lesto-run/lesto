name: CI

# The first CI gate for Lesto. Every job is blocking: typecheck, lint, the
# 100%-coverage test gate, and formatting (the content-* formatting debt that
# once kept the format step informational has been paid down — all 58 packages
# check clean, so a format regression now fails the build).

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run ws:typecheck

      # `ws:typecheck` filters to `@lesto/*`; the browser-e2e suite is deliberately named
      # `lesto-e2e` (outside that scope, so the workspace test/typecheck filters skip it),
      # so its Playwright specs are typechecked here explicitly — otherwise a type error in
      # a spec ships green (Playwright transpiles with esbuild, which strips types, not checks).
      - name: Typecheck (e2e specs)
        working-directory: packages/e2e
        run: bun run typecheck

      # The end-to-end TYPE-regression gate (board 206e92c6): a zero-dependency
      # `tsc --noEmit` over `type-tests/` that pins the differentiator's INFERRED
      # types — `@lesto/db`'s schema-as-value `InferRow`/`InferInsert`/`InferUpdate`
      # and `@lesto/client`'s contract-typed request/response/mutation shapes. The
      # 100%-coverage gate above proves the runtime; this proves the types still
      # hold, so a silent inference drift (a row field widening to `unknown`, a
      # required insert key going optional) fails the build instead of shipping.
      # No external dep, no lockfile mutation — just `tsc` over an in-repo assert kit.
      - name: Type-regression suite
        run: bun run test:types

      - name: Lint
        run: bun run lint

      # Coverage-gated: every package that declares a `test:cov` script is run
      # under v8 coverage and must meet its 100% lines/branches/functions/
      # statements threshold. Runs serially (see scripts/coverage-gate.ts) so the
      # gate is deterministic on a busy runner. Excludes the frozen content-*
      # baselines (no thresholds yet) and @lesto/integration/e2e (no test:cov),
      # which run as their own steps below.
      - name: Test (coverage-gated)
        run: bun run ws:test:cov

      # The folded-in content-* suites carry tracked, frozen coverage debt
      # (see CONTENT_COVERAGE.md) and are not gated yet — run them without the
      # coverage threshold so their tests still execute on every PR.
      - name: Test (content packages, ungated)
        run: bun run --filter '@lesto/content-*' test

      # @lesto/integration is a cross-package journey suite with no src of its own
      # to cover, so it declares no thresholds and is excluded from the gate.
      - name: Test (integration)
        working-directory: packages/integration
        run: bun run test

      # The examples gallery is the per-wave QA gate (docs/plans/examples-gallery.md):
      # each `examples/<feature>/` wires ONLY a battery's real public API and proves
      # the journey over HTTP. Run ungated — examples are OUT of the 100% coverage
      # gate by design (coverage-gate.ts globs packages/ only), like estate/blog.
      - name: Test (examples gallery)
        run: bun run examples:test

      # The documentation site (site/) is a Lesto app built on @lesto/content-*.
      # Like the examples it is out of the coverage gate (it lives outside
      # packages/), so run its tests here — and prove the static build, since the
      # site is not "done" until `build.ts` prerenders every Markdown page to HTML.
      - name: Test (docs site)
        run: bun run --filter '@lesto/site' test

      - name: Build (docs site)
        run: bun run --filter '@lesto/site' build

      - name: Format check
        run: bun run ws:format:check

  # Bundle-size assertion: builds the island client through the real
  # `@lesto/assets` pipeline for both dialects and fails if the gzipped entry
  # exceeds its budget (react ≤ 65 KB, preact ≤ 15 KB). Its own job because
  # `Bun.build` is a Bun-only edge that cannot run under the vitest coverage gate
  # — this is what stops the 118 KB react-dom-server-dragging bundle (blocker #8)
  # from silently returning.
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert island client bundle sizes
        run: bun run bundle-size

  # Browser E2E (Playwright) is a separate job: it needs a browser binary and
  # boots a real server, so it runs apart from the workspace unit/integration
  # tests. `lesto-e2e` is named outside `@lesto/*`, so `ws:test` above skips it.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Browser E2E (island hydration)
        working-directory: packages/e2e
        run: bun run test:e2e

  # The scaffold→run loop, end to end (blocker #9): scaffold a fresh app with
  # `create-lesto`, link the workspace packages, `lesto build`, boot `lesto dev`,
  # curl the route, and assert the island HYDRATES in a real browser on the Preact
  # bundle. Its own job (like `db-parity-postgres`) so the three silent scaffold
  # breaks — missing @lesto/cli dep, unresolvable @lesto/*@latest, the lesto.sites.ts
  # crash — are caught on every PR. Needs a browser binary, so it boots apart.
  scaffold-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Scaffold → build → dev → curl → hydrate
        working-directory: packages/e2e
        run: bun run test:scaffold

  # Island Fast Refresh, end to end (DX-parity R2, ADR 0011): boot the real `lesto dev`
  # against `examples/island-fast-refresh` (which opts into `@lesto/island-dev`, the
  # Preact-dialect scaffold-default path) and drive a real browser to prove the live HMR
  # round-trip — the island hydrates, the cross-port HMR WebSocket connects, and editing
  # the island applies new code while PRESERVING `useState` (Fast Refresh, not a reload).
  # The unit/transform tests cover the pure config; only a browser can prove the round
  # trip, so — like `e2e` and `scaffold-loop` — it needs a chromium binary and its own job.
  island-fast-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev → browser → edit island → useState preserved
        working-directory: packages/e2e
        run: bun run test:island-hmr

  # Dev page-swap, end to end (DX-parity R2, L-109e9329): the "second half" of HMR — a
  # saved `app/routes/*` file re-renders + swaps the page in place instead of a full
  # reload. Boots `lesto dev`, edits a route file, and asserts the new markup appears
  # while a window marker SURVIVES (proving a same-document swap, not a reload). Needs a
  # browser, so it's its own job like the other island-dev e2e jobs.
  page-swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev → edit a route file → page swaps in place (no full reload)
        working-directory: packages/e2e
        run: bun run test:page-swap

  # Dev page-swap on the BUN dev path (L-7dd16878): the page-swap hook was Vite-only; now
  # `buildClient` threads `mode` so the Bun fallback entry installs it too. Copies the
  # fixture to a temp app WITHOUT the @lesto/island-dev peer (→ Bun path, bare /client.js),
  # boots `lesto dev`, edits a route file, and asserts the swap + window-marker survival —
  # the Bun twin of the `page-swap` job. Needs a browser, so it's its own job.
  page-swap-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev (Bun path) → edit a route file → page swaps in place (no full reload)
        working-directory: packages/e2e
        run: bun run test:page-swap-bun

  # Build-vs-dev bundler PARITY (DX-parity R2, L-56f79043): Phase 1 serves islands via
  # Vite in dev but bundles them with Bun.build in prod — a real mismatch. This gates the
  # Vite-dev scaffold default: it copies one example to two temp apps differing ONLY in
  # whether they declare the @lesto/island-dev peer (the switch that picks the dev bundler),
  # boots each under real `lesto dev`, and asserts the SAME Counter island hydrates under
  # BOTH bundlers — catching a "works in dev, breaks built" divergence. Needs a browser, so
  # it's its own job like `island-fast-refresh` and `scaffold-loop`.
  bundler-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Same island hydrates under Bun.build and Vite (both via lesto dev)
        working-directory: packages/e2e
        run: bun run test:bundler-parity

  # Concurrent `lesto dev` keeps Fast Refresh (DX-parity R2, L-40a57050): island-dev now
  # picks a FREE Vite/HMR port pair per `lesto dev` (`findIslandDevPorts`) instead of the
  # old fixed 24677/24678, so a second concurrent dev server no longer fails to bind and
  # degrade. Boots the same example TWICE on two app ports at once and asserts BOTH serve
  # the island via Vite — the regression guard that makes Fast Refresh safe as the scaffold
  # default. Needs a browser, so it's its own job like the other island-dev e2e jobs.
  island-dev-concurrent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Two concurrent lesto dev apps both serve Fast Refresh
        working-directory: packages/e2e
        run: bun run test:island-concurrent

  # The data-layer parity suite runs SQLite always (in `check` above); this job
  # is the ONLY place its Postgres leg executes — against a real Postgres service
  # — so the async seam is proven against a genuinely networked driver, not just
  # the synchronous in-process SQLite the coverage gate exercises (ADR 0006).
  # node-postgres (`pg`) is a peer the consumer provides, so it is installed here
  # ad-hoc rather than carried in the workspace lockfile.
  db-parity-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (peer of @lesto/pg)
        working-directory: packages/integration
        run: bun add pg

      - name: Cross-driver parity (SQLite + Postgres)
        working-directory: packages/integration
        env:
          LESTO_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run test

  # The live logical-replication shakeout for @lesto/live-server's Tier-4 change source (ADR 0042):
  # the ONLY gate that exercises the coverage-excluded `pg-replication-client.ts` socket wiring end
  # to end — a real START_REPLICATION COPY stream, XLogData framing, standby-status LSN feedback,
  # and slot drop — against a genuine `pgoutput` WAL stream (the pure byte codecs + decoder are unit
  # tested in `replication-frames.test.ts` / `pgoutput.test.ts`, but a live slot is the only thing
  # that proves the wiring). Unlike `db-parity-postgres` (whose postgres runs the default
  # `wal_level=replica` and so CANNOT do logical decoding), this postgres is started with
  # `wal_level=logical` + replication slots/senders via `POSTGRES_INITDB_ARGS` — initdb's `-c`
  # (PG 15+) writes those GUCs into postgresql.conf so the service boots with them (service
  # containers cannot override the container command, and `wal_level` needs a restart-time setting).
  # It is a `bun`-run script, not a vitest test, because vitest's runner hangs on the long-lived
  # COPY stream. Its own job (like `db-parity-postgres`) so the container is off the coverage gate.
  live-server-pgoutput-shakeout:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          # initdb `-c` (PG 15+) persists these into postgresql.conf, so the server boots with
          # logical decoding enabled and room for the shakeout's two slots/walsenders.
          POSTGRES_INITDB_ARGS: "-c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (an optional peer of @lesto/live-server)
        working-directory: packages/live-server
        run: bun add pg

      - name: Live pgoutput logical-replication shakeout
        working-directory: packages/live-server
        env:
          LESTO_LIVE_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run shakeout:pgoutput

  # The Tier-4 v1 CAPSTONE acceptance gate (ADR 0042 Inc8, L-b1501de9) — the epic-closing
  # gallery-as-QA gate. Unlike the shakeout above (which proves the raw `pg-replication-client.ts`
  # socket wiring), this drives the whole capstone APP on the real logical-replication path and
  # asserts the full v1 together: the per-row shape-authz matrix (a)-(e), offline writes reconciled
  # through the REAL `@lesto/live` store/outbox/consumer, at-least-once idempotency, and a clean slot
  # drop. Same `postgres:16` + `wal_level=logical` service and `bun add pg` peer install as the
  # shakeout; a `bun`-run script (not vitest — vitest hangs on the long-lived COPY stream), in its own
  # job so the container is off the coverage gate. The browser-only guarantees (OPFS durability,
  # cross-tab relay) are proven by @lesto/live's seam unit tests + the README's manual checklist.
  live-capstone-acceptance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "-c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (an optional peer of the Postgres change source)
        working-directory: examples/live-capstone
        run: bun add pg

      - name: Tier-4 v1 capstone acceptance (real logical replication)
        working-directory: examples/live-capstone
        env:
          LESTO_LIVE_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run acceptance:pg

  # Browser→server RUM tracing (ARCHITECTURE.md §7's headline differentiator):
  # boots a served page over a real socket + a local OTLP collector, reads the
  # SSR-injected `lesto-traceparent` meta the way a browser would, POSTs the
  # browser's navigation/resource/web-vital spans to the built-in
  # `/__lesto/browser-spans` receiver, and asserts they land UNDER the server
  # `http.request` span — one traceId. Its own job (like `db-parity-postgres`) so
  # this cross-tier join is proven on every PR, not silently regressed.
  browser-rum-trace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Browser→server RUM trace join (one traceId, local OTLP collector)
        working-directory: packages/integration
        run: bun run test test/rum.integration.test.ts

  # Edge-Postgres parity: the Cloudflare Hyperdrive adapter (hyperdriveToSqlDatabase,
  # @lesto/cloudflare) must speak the SAME @lesto/db SqlDatabase contract over a REAL
  # Postgres socket that the node @lesto/pg driver does — Hyperdrive is the
  # flagship-tier Postgres path. Wrapping a real pg connection exactly as Hyperdrive
  # exposes it (one pinned connection), the gated integration suite runs the same
  # conformance body against postgres:16. Its own job (like db-parity-postgres) so
  # the container is never on the coverage gate's critical path.
  hyperdrive-parity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (the Hyperdrive parity test connects with it)
        working-directory: packages/integration
        run: bun add pg

      - name: Edge-Postgres parity (Hyperdrive adapter over a real Postgres)
        working-directory: packages/integration
        env:
          LESTO_HYPERDRIVE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run test

  # The scaffold→Cloudflare-deploy loop, hermetically (task B4): scaffold a fresh
  # app with `create-lesto --local`, `lesto build`, then prove the shipped
  # `wrangler.jsonc` + `worker.ts` actually deploy with `wrangler deploy --dry-run`
  # (which bundles the Worker and reads the assets dir but never contacts the
  # Cloudflare API — so no secrets, no account). Its own job (like `scaffold-loop`
  # and `db-parity-postgres`) because it needs Node 22 on PATH for wrangler, which
  # the Bun-only jobs do not carry. A green dry-run is the standing guarantee that a
  # fresh scaffold's shipped Worker bundles and its wrangler config validates on every
  # PR; the `lesto deploy --cloudflare` flag-parsing + health-gate are covered by CLI
  # unit tests. The EXACT wrangler subcommands the driver spawns (`wrangler deploy`,
  # `wrangler rollback --message …`) are pinned in `packages/cli/test/wrangler.test.ts`,
  # so flag drift fails the cli gate on a PR rather than a live deploy — this dry-run
  # proves the bundle; that test proves the flags.
  deploy-cloudflare-dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      # wrangler needs Node (>=20); the dry-run runs under it while the scaffold +
      # build run under Bun.
      - name: Set up Node 22 (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scaffold a fresh app (create-lesto --local)
        run: bun packages/create-lesto/src/bin.ts cf-dry-app --local

      # Link the scaffolded app's node_modules at the repo's installed workspace
      # node_modules — the publish-equivalent of `bun install` while the @lesto/*
      # packages are unpublished (the same trick packages/e2e's scaffold-loop uses).
      - name: Link workspace node_modules into the scaffolded app
        run: ln -s "$GITHUB_WORKSPACE/node_modules" cf-dry-app/node_modules

      - name: Build the static site + island client (lesto build)
        working-directory: cf-dry-app
        run: bun "$GITHUB_WORKSPACE/packages/cli/src/bin.ts" build

      # The shipped wrangler.jsonc must parse as JSONC (comments + trailing commas).
      # wrangler's own loader proves it in the dry-run below; this asserts it first,
      # dependency-free: strip whole-line `//` comments + trailing commas, JSON.parse,
      # and check main/assets. Single-quoted so the shell never touches `$1`/`\s`.
      - name: Assert wrangler.jsonc is valid JSONC
        working-directory: cf-dry-app
        run: |
          node -e 'const s=require("fs").readFileSync("wrangler.jsonc","utf8");const j=s.replace(/^\s*\/\/.*$/gm,"").replace(/,(\s*[}\]])/g,"$1");const c=JSON.parse(j);if(c.main!=="worker.ts"||c.assets.binding!=="ASSETS")throw new Error("unexpected wrangler config: "+JSON.stringify(c));console.log("wrangler.jsonc is valid JSONC")'

      # The headline: the scaffolded Worker bundles and its config validates. The
      # dry-run exits 0 without ever contacting Cloudflare (no secrets in main CI).
      - name: wrangler deploy --dry-run
        working-directory: cf-dry-app
        run: npx --yes wrangler@4 deploy --dry-run

  # The install-and-boot proof (publish-day step 7): the ONLY gate that exercises the
  # PACKAGED shape rather than workspace symlinks. `scripts/pack-and-boot.mjs` packs
  # every public package with `bun pm pack` (rewriting `workspace:*` → `0.1.0`),
  # scaffolds an app pinned at those tarballs via npm `overrides`, then `npm install`s
  # and boots `lesto routes` UNDER NODE — the exact path `npx create-lesto` / `lesto`
  # take for an outsider who never touches bun. Unlike `scaffold-loop` and
  # `deploy-cloudflare-dry` (which symlink the workspace `node_modules`, so prove
  # nothing about resolution), this catches a package missing from the publish closure,
  # an undeclared dependency, or an eager import dragging an optional subsystem into the
  # default install. Needs Bun (to pack) AND Node (the outsider's install + boot runtime).
  install-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Set up Node 22 (the outsider's runtime — install + boot run under it)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pack → scaffold from tarballs → install + boot under node
        run: bun run test:pack-boot
