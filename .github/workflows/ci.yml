name: CI

# The first CI gate for Lesto. Every job is blocking: typecheck, lint, the
# 100%-coverage test gate, and formatting (the content-* formatting debt that
# once kept the format step informational has been paid down — all 58 packages
# check clean, so a format regression now fails the build).
#
# COUPLING: release.yml's green-CI gate matches this workflow by filename
# (`gh run list --workflow=ci.yml --event push`). Renaming this file will make that
# gate find no run and HARD-FAIL every release (fail-closed, never fail-open) — update
# release.yml's `--workflow=` in the same commit if you rename it.
#
# RELEASE-GATE INVARIANT: the release gate (release.yml, and its fail-fast local mirror in
# `scripts/dev/release.sh` / `bun run release:cut`) enforces the success of THIS workflow ONLY.
# It does NOT wait on any other workflow. Some run on push to main (live-capstone-e2e.yml,
# deploy-examples.yml); others only on workflow_dispatch/schedule (benchmarks.yml, the scaffold
# preflights) — but EITHER WAY they are INVISIBLE to the release gate: a release can publish while
# they are red, still running, or (for the dispatch-only ones) never triggered for this SHA at all.
# THEREFORE: any check that must block a release has to be a JOB IN THIS FILE (the cheapest
# option). If a release-blocking gate genuinely cannot live here, the alternative is to extend
# release.yml's gate query to also require that workflow's success for the SHA — but do not
# assume a green main means those other workflows passed; the gate never looked at them.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Shell lint for the repo's shell scripts (L-539f5d80). `scripts/dev/release.sh`
      # (`bun run release:cut`, ~330 lines) drives the publish path and has already shipped
      # shell bugs (the set -u ellipsis-abutting-$var trap 571f657; a fail-open command-
      # substitution acebe88). There was NO shell lint anywhere in the repo; this is the
      # standing guard. It needs no project deps, so it runs FIRST — before the Bun setup and
      # install — to fail fast and cheaply. Scope is `git ls-files '*.sh'` (every TRACKED .sh,
      # not a fixed dir glob) so coverage grows with the repo; today that is the four scripts/dev/
      # scripts. NUL-delimited (`-z`/`-0`) to be filename-safe.
      #
      #   - `bash -n` is the zero-install floor: a pure parse/syntax check over every script. KEPT
      #     because it runs FIRST and needs nothing installed — so even if the pinned-shellcheck
      #     download below is unreachable (a GitHub-releases outage) you still get a syntax check.
      #     Caveat: it parses the three `#!/bin/sh` scripts as bash, but bash is a near-superset for
      #     PARSE purposes, so as a syntax smoke test that dialect gap is acceptable; shellcheck
      #     (which reads each shebang) is the dialect-correct lint below.
      #   - `shellcheck` is the real lint (unquoted expansions, fail-open `$?` patterns, …), run at
      #     its DEFAULT severity — every default finding is BLOCKING, the correct strictness for the
      #     publish-path scripts and deliberately NOT softened. The scripts are verified clean at
      #     0.11.0, so a new finding fails the build.
      #     PINNED + checksum-verified (L-fa5c444c): we do NOT use the `ubuntu-latest` bundled
      #     shellcheck, whose version FLOATS with the runner image. A floating bump can promote a
      #     new default-severity check that reds an UNRELATED PR, and since release.sh's
      #     PRECONDITION #1 and release.yml's gate both refuse to publish unless ci.yml concluded
      #     success, that would block ALL releases (and main) until someone quiets the finding — it
      #     fails CLOSED (never ships bad code) but the blast radius is "no releases". Pinning makes
      #     the lint result reproducible: it changes only when we change the two literals in the
      #     install step, never under us. MECHANISM: we download the official release tarball
      #     straight from koalaman/shellcheck and verify its sha256 BEFORE executing —
      #     deliberately NOT a third-party marketplace action (e.g. ludeeus/action-shellcheck),
      #     which would add someone else's code to the supply chain of a workflow that
      #     provenance-signs releases and secret-scans outgoing commits. This is the smallest
      #     trusted-computing-base that is still fully reproducible. TO BUMP: change
      #     SHELLCHECK_VERSION + SHELLCHECK_SHA256 together (the sha256 is published as the asset
      #     digest at github.com/koalaman/shellcheck/releases) and re-verify the scripts are clean.
      - name: Shell-syntax check (bash -n) over tracked *.sh
        run: git ls-files -z '*.sh' | xargs -0 -r -n1 bash -n

      # Install the pinned shellcheck (rationale above): fetch the exact release tarball, verify its
      # digest, then prepend it to PATH so the lint step below resolves THIS binary, not the runner
      # image's. GitHub's default run shell is `bash -eo pipefail`, so a digest mismatch
      # (`sha256sum -c`) or a failed download (`curl -f`) fails the job — fail-closed by design.
      - name: Install pinned shellcheck
        # ARCH ASSUMPTION: the download URL below hardcodes `linux.x86_64`, valid while this job runs
        # on `ubuntu-latest` (x86_64 today). It fails CLOSED on a non-x86_64 runner (curl 404 / the
        # `--version` self-check aborts under `bash -eo pipefail`), but a future migration to an
        # `ubuntu-*-arm` image would then block ALL of CI/releases — so an arm64 runner needs the
        # `.linux.aarch64` asset + ITS own SHELLCHECK_SHA256 here.
        env:
          SHELLCHECK_VERSION: "0.11.0"
          SHELLCHECK_SHA256: "8c3be12b05d5c177a04c29e3c78ce89ac86f1595681cab149b65b97c4e227198"
        run: |
          url="https://github.com/koalaman/shellcheck/releases/download/v${SHELLCHECK_VERSION}/shellcheck-v${SHELLCHECK_VERSION}.linux.x86_64.tar.xz"
          curl -fsSL --retry 3 -o "$RUNNER_TEMP/shellcheck.tar.xz" "$url"
          echo "${SHELLCHECK_SHA256}  $RUNNER_TEMP/shellcheck.tar.xz" | sha256sum -c -
          tar -xJf "$RUNNER_TEMP/shellcheck.tar.xz" -C "$RUNNER_TEMP"
          "$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}/shellcheck" --version
          echo "$RUNNER_TEMP/shellcheck-v${SHELLCHECK_VERSION}" >> "$GITHUB_PATH"

      - name: Shell lint (shellcheck) over tracked *.sh
        run: git ls-files -z '*.sh' | xargs -0 -r shellcheck

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Drift guard for bun 1.3.5's ISOLATED layout: the repo-root node_modules must
      # hold only the ~16 externals — NO `@lesto/*`, `jiti`, or `pg` hoisted to root.
      # Several jobs (scaffold, cf-dry, replication) depend on that shape, so assert it
      # here right after install and fail fast if a future bun bump re-hoists to root.
      - name: Assert isolated node_modules layout (no @lesto at root)
        run: bun scripts/assert-isolated-node-modules.mjs

      # The drift guard's OWN unit suite, link-workspace's semver/store units, the dev-harness
      # fail-fast guard, and publish.mjs's fail-closed ordering logic run nowhere else: `scripts/`
      # is not a workspace package and `lesto-e2e` declares no `test:cov`, so the coverage gate never
      # sweeps them. The dev-harness guard fires only on a boot failure the Playwright specs' happy
      # path never provokes, and publish.test.mjs proves the topological/fail-fast ordering that keeps
      # a release from shipping a dependent before a failed dep — run them here (no server needed) so a
      # regression goes red instead of shipping green.
      - name: Unit-test the drift guard + link-workspace + dev-harness + publish/new-package/build-shape/readme-coverage helpers
        run: bunx vitest run scripts/assert-isolated-node-modules.test.mjs packages/e2e/link-workspace.test.ts packages/e2e/dev-harness.test.ts scripts/publish.test.mjs scripts/new-package.test.mjs scripts/build-public.test.mjs scripts/preflight-versions.test.mjs scripts/gen-readmes.test.mjs

      - name: Typecheck
        run: bun run ws:typecheck

      # `ws:typecheck` filters to `@lesto/*`; the browser-e2e suite is deliberately named
      # `lesto-e2e` (outside that scope, so the workspace test/typecheck filters skip it),
      # so its Playwright specs are typechecked here explicitly — otherwise a type error in
      # a spec ships green (Playwright transpiles with esbuild, which strips types, not checks).
      - name: Typecheck (e2e specs)
        working-directory: packages/e2e
        run: bun run typecheck

      # The end-to-end TYPE-regression gate (board 206e92c6): a zero-dependency
      # `tsc --noEmit` over `type-tests/` that pins the differentiator's INFERRED
      # types — `@lesto/db`'s schema-as-value `InferRow`/`InferInsert`/`InferUpdate`
      # and `@lesto/client`'s contract-typed request/response/mutation shapes. The
      # 100%-coverage gate above proves the runtime; this proves the types still
      # hold, so a silent inference drift (a row field widening to `unknown`, a
      # required insert key going optional) fails the build instead of shipping.
      # No external dep, no lockfile mutation — just `tsc` over an in-repo assert kit.
      - name: Type-regression suite
        run: bun run test:types

      - name: Lint
        run: bun run lint

      # Coverage-gated: every package that declares a `test:cov` script is run
      # under v8 coverage and must meet its 100% lines/branches/functions/
      # statements threshold. Runs serially (see scripts/coverage-gate.ts) so the
      # gate is deterministic on a busy runner. Excludes the frozen content-*
      # baselines (no thresholds yet) and @lesto/integration/e2e (no test:cov),
      # which run as their own steps below.
      - name: Test (coverage-gated)
        run: bun run ws:test:cov

      # The folded-in content-* suites carry tracked, frozen coverage debt
      # (see CONTENT_COVERAGE.md) and are not gated yet — run them without the
      # coverage threshold so their tests still execute on every PR.
      - name: Test (content packages, ungated)
        run: bun run --filter '@lesto/content-*' test

      # @lesto/integration is a cross-package journey suite with no src of its own
      # to cover, so it declares no thresholds and is excluded from the gate.
      - name: Test (integration)
        working-directory: packages/integration
        run: bun run test

      # The examples gallery is the per-wave QA gate (docs/plans/examples-gallery.md):
      # each `examples/<feature>/` wires ONLY a battery's real public API and proves
      # the journey over HTTP. Run ungated — examples are OUT of the 100% coverage
      # gate by design (coverage-gate.ts globs packages/ only), like estate/blog.
      - name: Test (examples gallery)
        run: bun run examples:test

      # The documentation site (site/) is a Lesto app built on @lesto/content-*.
      # Like the examples it is out of the coverage gate (it lives outside
      # packages/), so run its tests here — and prove the static build, since the
      # site is not "done" until `build.ts` prerenders every Markdown page to HTML.
      - name: Test (docs site)
        run: bun run --filter '@lesto/site' test

      - name: Build (docs site)
        run: bun run --filter '@lesto/site' build

      - name: Format check
        run: bun run ws:format:check

  # Bundle-size assertion: builds the island client through the real
  # `@lesto/assets` pipeline for both dialects and fails if the gzipped entry
  # exceeds its budget (react ≤ 65 KB, preact ≤ 15 KB). Its own job because
  # `Bun.build` is a Bun-only edge that cannot run under the vitest coverage gate
  # — this is what stops the 118 KB react-dom-server-dragging bundle (blocker #8)
  # from silently returning.
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Assert island client bundle sizes
        run: bun run bundle-size

  # Browser E2E (Playwright) is a separate job: it needs a browser binary and
  # boots a real server, so it runs apart from the workspace unit/integration
  # tests. `lesto-e2e` is named outside `@lesto/*`, so `ws:test` above skips it.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Browser E2E (island hydration)
        working-directory: packages/e2e
        run: bun run test:e2e

  # The scaffold→run loop, end to end (blocker #9): scaffold a fresh app with
  # `create-lesto`, link the workspace packages, `lesto build`, boot `lesto dev`,
  # curl the route, and assert the island HYDRATES in a real browser on the Preact
  # bundle. Its own job (like `db-parity-postgres`) so the three silent scaffold
  # breaks — missing @lesto/cli dep, unresolvable @lesto/*@latest, the lesto.sites.ts
  # crash — are caught on every PR. Needs a browser binary, so it boots apart.
  scaffold-loop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Scaffold → build → dev → curl → hydrate
        working-directory: packages/e2e
        run: bun run test:scaffold

  # Island Fast Refresh, end to end (DX-parity R2, ADR 0011): boot the real `lesto dev`
  # against `examples/island-fast-refresh` (which opts into `@lesto/island-dev`, the
  # Preact-dialect scaffold-default path) and drive a real browser to prove the live HMR
  # round-trip — the island hydrates, the cross-port HMR WebSocket connects, and editing
  # the island applies new code while PRESERVING `useState` (Fast Refresh, not a reload).
  # The unit/transform tests cover the pure config; only a browser can prove the round
  # trip, so — like `e2e` and `scaffold-loop` — it needs a chromium binary and its own job.
  island-fast-refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev → browser → edit island → useState preserved
        working-directory: packages/e2e
        run: bun run test:island-hmr

  # Dev page-swap, end to end (DX-parity R2, L-109e9329): the "second half" of HMR — a
  # saved `app/routes/*` file re-renders + swaps the page in place instead of a full
  # reload. Boots `lesto dev`, edits a route file, and asserts the new markup appears
  # while a window marker SURVIVES (proving a same-document swap, not a reload). Needs a
  # browser, so it's its own job like the other island-dev e2e jobs.
  page-swap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev → edit a route file → page swaps in place (no full reload)
        working-directory: packages/e2e
        run: bun run test:page-swap

  # Dev page-swap on the BUN dev path (L-7dd16878): the page-swap hook was Vite-only; now
  # `buildClient` threads `mode` so the Bun fallback entry installs it too. Copies the
  # fixture to a temp app WITHOUT the @lesto/island-dev peer (→ Bun path, bare /client.js),
  # boots `lesto dev`, edits a route file, and asserts the swap + window-marker survival —
  # the Bun twin of the `page-swap` job. Needs a browser, so it's its own job.
  page-swap-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: lesto dev (Bun path) → edit a route file → page swaps in place (no full reload)
        working-directory: packages/e2e
        run: bun run test:page-swap-bun

  # Build-vs-dev bundler PARITY (DX-parity R2, L-56f79043): Phase 1 serves islands via
  # Vite in dev but bundles them with Bun.build in prod — a real mismatch. This gates the
  # Vite-dev scaffold default: it copies one example to two temp apps differing ONLY in
  # whether they declare the @lesto/island-dev peer (the switch that picks the dev bundler),
  # boots each under real `lesto dev`, and asserts the SAME Counter island hydrates under
  # BOTH bundlers — catching a "works in dev, breaks built" divergence. Needs a browser, so
  # it's its own job like `island-fast-refresh` and `scaffold-loop`.
  bundler-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Same island hydrates under Bun.build and Vite (both via lesto dev)
        working-directory: packages/e2e
        run: bun run test:bundler-parity

  # Concurrent `lesto dev` keeps Fast Refresh (DX-parity R2, L-40a57050): island-dev now
  # picks a FREE Vite/HMR port pair per `lesto dev` (`findIslandDevPorts`) instead of the
  # old fixed 24677/24678, so a second concurrent dev server no longer fails to bind and
  # degrade. Boots the same example TWICE on two app ports at once and asserts BOTH serve
  # the island via Vite — the regression guard that makes Fast Refresh safe as the scaffold
  # default. Needs a browser, so it's its own job like the other island-dev e2e jobs.
  island-dev-concurrent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Two concurrent lesto dev apps both serve Fast Refresh
        working-directory: packages/e2e
        run: bun run test:island-concurrent

  # The data-layer parity suite runs SQLite always (in `check` above); this job
  # is the ONLY place its Postgres leg executes — against a real Postgres service
  # — so the async seam is proven against a genuinely networked driver, not just
  # the synchronous in-process SQLite the coverage gate exercises (ADR 0006).
  # node-postgres (`pg`) is a peer the consumer provides, so it is installed here
  # ad-hoc rather than carried in the workspace lockfile.
  db-parity-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (peer of @lesto/pg)
        working-directory: packages/integration
        run: bun add pg@^8

      - name: Cross-driver parity (SQLite + Postgres)
        working-directory: packages/integration
        env:
          LESTO_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run test

  # The live logical-replication shakeout for @lesto/live-server's Tier-4 change source (ADR 0042):
  # the ONLY gate that exercises the coverage-excluded `pg-replication-client.ts` socket wiring end
  # to end — a real START_REPLICATION COPY stream, XLogData framing, standby-status LSN feedback,
  # and slot drop — against a genuine `pgoutput` WAL stream (the pure byte codecs + decoder are unit
  # tested in `replication-frames.test.ts` / `pgoutput.test.ts`, but a live slot is the only thing
  # that proves the wiring). Unlike `db-parity-postgres` (whose postgres runs the default
  # `wal_level=replica` and so CANNOT do logical decoding), this postgres is started with
  # `wal_level=logical` + replication slots/senders via `POSTGRES_INITDB_ARGS` — initdb's `-c`
  # (PG 15+) writes those GUCs into postgresql.conf so the service boots with them (service
  # containers cannot override the container command, and `wal_level` needs a restart-time setting).
  # It is a `bun`-run script, not a vitest test, because vitest's runner hangs on the long-lived
  # COPY stream. Its own job (like `db-parity-postgres`) so the container is off the coverage gate.
  live-server-pgoutput-shakeout:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          # initdb `-c` (PG 15+) persists these into postgresql.conf, so the server boots with
          # logical decoding enabled and room for the shakeout's two slots/walsenders.
          POSTGRES_INITDB_ARGS: "-c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (an optional peer of @lesto/live-server)
        working-directory: packages/live-server
        run: bun add pg@^8

      - name: Live pgoutput logical-replication shakeout
        working-directory: packages/live-server
        env:
          LESTO_LIVE_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run shakeout:pgoutput

  # The Tier-4 v1 CAPSTONE acceptance gate (ADR 0042 Inc8, L-b1501de9) — the epic-closing
  # gallery-as-QA gate. Unlike the shakeout above (which proves the raw `pg-replication-client.ts`
  # socket wiring), this drives the whole capstone APP on the real logical-replication path and
  # asserts the full v1 together: the per-row shape-authz matrix (a)-(e), offline writes reconciled
  # through the REAL `@lesto/live` store/outbox/consumer, at-least-once idempotency, and a clean slot
  # drop. Same `postgres:16` + `wal_level=logical` service and `bun add pg` peer install as the
  # shakeout; a `bun`-run script (not vitest — vitest hangs on the long-lived COPY stream), in its own
  # job so the container is off the coverage gate. The browser-only guarantees (OPFS durability,
  # cross-tab relay) are proven by @lesto/live's seam unit tests + the real-Chromium regression gate
  # (`live-capstone-e2e.yml`, `L-2e410682`) — NOT a manual checklist. NOTE: that gate is a standalone
  # workflow, so the release gate (which sees only ci.yml jobs) cannot see it yet — folding it in is
  # GA-2 (`L-cc849577`), a publish blocker for the Tier-4 packages.
  live-capstone-acceptance:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_INITDB_ARGS: "-c wal_level=logical -c max_replication_slots=10 -c max_wal_senders=10"
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Install pg at the REPO ROOT (not the examples/live-capstone subtree): the
      # replication client (packages/live-server/src/pg-replication-client.ts) does a
      # createRequire-rooted `require("pg")` that resolves from packages/live-server and
      # CANNOT walk up into the example subtree — installing it under the example would
      # leave the acceptance run crashing with `Cannot find package 'pg'`. Landing pg in
      # root node_modules makes it reachable from packages/live-server AND packages/pg.
      - name: Install the pg driver (an optional peer of the Postgres change source)
        run: bun add pg@^8

      # Verify the client bundles — the OPFS engine's LITERAL dynamic import must survive a real
      # `vite build` (the landmine that founded examples/live-durable; a non-literal specifier is
      # silently dropped, emitting a bundle with none of the ~1.1 MB engine). This proves the "runs
      # locally AND deploys" half; the browser session that exercises the bundle is the manual README step.
      - name: Build the capstone client bundle
        working-directory: examples/live-capstone
        run: bun run build

      - name: Tier-4 v1 capstone acceptance (real logical replication)
        working-directory: examples/live-capstone
        env:
          LESTO_LIVE_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run acceptance:pg

      # Dead-alarm regression guard for the slot-lag probe (ADR 0042 Inc8, `L-2c330109`). The acceptance
      # run above boots a real wal_level=logical slot but NEVER invokes `slot-lag`, so a column-name /
      # function typo in readSlotLag's `pg_replication_slots` / `pg_wal_lsn_diff(pg_current_wal_lsn(),
      # restart_lsn)::bigint` query would ship a SILENTLY DEAD alarm — dead exactly when the disk it
      # guards is filling. This step is the missing regression check.
      #
      # WHY the exit code is tolerated but the verdict line is asserted: right after acceptance drops its
      # slot, the probe LEGITIMATELY WARNs (exit 1, `slot "…" not present`), so a naive `bun run slot-lag`
      # would red-fail on a healthy run. But a naive `|| true` would let a dead alarm pass silently. So we
      # tolerate the non-zero exit yet ASSERT a `[OK|WARN|CRITICAL]` verdict line was emitted — that line
      # is printed ONLY after the pg_replication_slots / pg_wal_lsn_diff query returns and classifySlotLag
      # runs, so its presence is the exact proof the query executed. A column/function typo (or an
      # unreachable DB / missing `pg` peer) throws FIRST — exit 2, no verdict line — and fails this step.
      - name: Slot-lag probe query regression guard (dead-alarm check)
        working-directory: examples/live-capstone
        env:
          LESTO_LIVE_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: |
          # Capture combined stdout+stderr; `|| true` tolerates the legit non-zero exit (WARN=1 on the
          # dropped slot). The default GitHub shell runs with `set -eo pipefail`, so guard the assignment.
          output="$(bun run slot-lag 2>&1)" || true
          echo "$output"
          if ! printf '%s\n' "$output" | grep -qE '^\[(OK|WARN|CRITICAL)\]'; then
            echo "::error::slot-lag emitted no [OK|WARN|CRITICAL] verdict line — readSlotLag's pg_replication_slots / pg_wal_lsn_diff query did not run (dead alarm: column/function typo, DB unreachable, or missing pg peer), or the check exited UNKNOWN. Full probe output is echoed above."
            exit 1
          fi
          echo "slot-lag emitted a verdict line — the pg_replication_slots / pg_wal_lsn_diff query executed (alarm is live)."

  # Browser→server RUM tracing (ARCHITECTURE.md §7's headline differentiator):
  # boots a served page over a real socket + a local OTLP collector, reads the
  # SSR-injected `lesto-traceparent` meta the way a browser would, POSTs the
  # browser's navigation/resource/web-vital spans to the built-in
  # `/__lesto/browser-spans` receiver, and asserts they land UNDER the server
  # `http.request` span — one traceId. Its own job (like `db-parity-postgres`) so
  # this cross-tier join is proven on every PR, not silently regressed.
  browser-rum-trace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Browser→server RUM trace join (one traceId, local OTLP collector)
        working-directory: packages/integration
        run: bun run test test/rum.integration.test.ts

  # Edge-Postgres parity: the Cloudflare Hyperdrive adapter (hyperdriveToSqlDatabase,
  # @lesto/cloudflare) must speak the SAME @lesto/db SqlDatabase contract over a REAL
  # Postgres socket that the node @lesto/pg driver does — Hyperdrive is the
  # flagship-tier Postgres path. Wrapping a real pg connection exactly as Hyperdrive
  # exposes it (one pinned connection), the gated integration suite runs the same
  # conformance body against postgres:16. Its own job (like db-parity-postgres) so
  # the container is never on the coverage gate's critical path.
  hyperdrive-parity:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install the pg driver (the Hyperdrive parity test connects with it)
        working-directory: packages/integration
        run: bun add pg@^8

      - name: Edge-Postgres parity (Hyperdrive adapter over a real Postgres)
        working-directory: packages/integration
        env:
          LESTO_HYPERDRIVE_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: bun run test

  # The scaffold→Cloudflare-deploy loop, hermetically (task B4): scaffold a fresh
  # app with `create-lesto --local`, `lesto build`, then prove the shipped
  # `wrangler.jsonc` + `worker.ts` actually deploy with `wrangler deploy --dry-run`
  # (which bundles the Worker and reads the assets dir but never contacts the
  # Cloudflare API — so no secrets, no account). Its own job (like `scaffold-loop`
  # and `db-parity-postgres`) because it needs Node 22 on PATH for wrangler, which
  # the Bun-only jobs do not carry. A green dry-run is the standing guarantee that a
  # fresh scaffold's shipped Worker bundles and its wrangler config validates on every
  # PR; the `lesto deploy --cloudflare` flag-parsing + health-gate are covered by CLI
  # unit tests. The EXACT wrangler subcommands the driver spawns (`wrangler deploy`,
  # `wrangler rollback --message …`) are pinned in `packages/cli/test/wrangler.test.ts`,
  # so flag drift fails the cli gate on a PR rather than a live deploy — this dry-run
  # proves the bundle; that test proves the flags.
  deploy-cloudflare-dry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      # wrangler needs Node (>=20); the dry-run runs under it while the scaffold +
      # build run under Bun.
      - name: Set up Node 22 (for wrangler)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `--no-install` because the very next step symlinks the workspace node_modules
      # in; create-lesto's default `bun install` would otherwise run against the
      # unpublished @lesto/* graph and fail to resolve their `workspace:*` deps
      # standalone (the same reason packages/e2e's scaffold-loop.spec.ts uses it).
      - name: Scaffold a fresh app (create-lesto --local)
        run: bun packages/create-lesto/src/bin.ts cf-dry-app --local --no-install

      # Reconstruct the scaffolded app's node_modules via the shared helper: the
      # externals plus the `@lesto` scope that bun 1.3.5's ISOLATED layout no longer
      # hoists to the repo root. A bare symlink to root would resolve ZERO `@lesto/*`
      # (the next `lesto build` would die with `Cannot find module '@lesto/db'`), so
      # this is the publish-equivalent of `bun install` while the @lesto/* packages
      # are unpublished (the same helper packages/e2e's scaffold-loop uses).
      - name: Reconstruct the scaffolded app's node_modules (externals + @lesto scope)
        run: bun packages/e2e/link-workspace.ts cf-dry-app

      - name: Build the static site + island client (lesto build)
        working-directory: cf-dry-app
        run: bun "$GITHUB_WORKSPACE/packages/cli/src/bin.ts" build

      # The shipped wrangler.jsonc must parse as JSONC (comments + trailing commas).
      # wrangler's own loader proves it in the dry-run below; this asserts it first,
      # dependency-free: strip whole-line `//` comments + trailing commas, JSON.parse,
      # and check main/assets. Single-quoted so the shell never touches `$1`/`\s`.
      - name: Assert wrangler.jsonc is valid JSONC
        working-directory: cf-dry-app
        run: |
          node -e 'const s=require("fs").readFileSync("wrangler.jsonc","utf8");const j=s.replace(/^\s*\/\/.*$/gm,"").replace(/,(\s*[}\]])/g,"$1");const c=JSON.parse(j);if(c.main!=="worker.ts"||c.assets.binding!=="ASSETS")throw new Error("unexpected wrangler config: "+JSON.stringify(c));console.log("wrangler.jsonc is valid JSONC")'

      # The headline: the scaffolded Worker bundles and its config validates. The
      # dry-run exits 0 without ever contacting Cloudflare (no secrets in main CI).
      # `bunx`, not `npx`: bun is set up here and runs the fetched bin directly, whereas
      # `npx --yes wrangler@4` in this scaffolded dir fell back to a `sh -c wrangler` PATH
      # lookup and died `wrangler: not found` (127) without installing. wrangler still runs
      # under Node (its shebang) — that is what the Node 22 setup above provides.
      - name: wrangler deploy --dry-run
        working-directory: cf-dry-app
        run: bunx wrangler@4 deploy --dry-run

  # The install-and-boot proof (publish-day step 7): exercises the PACKAGED, PUBLISHED shape rather
  # than workspace symlinks. `scripts/pack-and-boot.mjs` BUILDS every public package to `dist/`, packs
  # the published shape (`exports`→dist, `workspace:*`→exact) via `packAllBuiltToVendor`, scaffolds an
  # app pinned at those tarballs via npm `overrides`, then `npm install`s and boots `lesto routes`
  # UNDER NODE — the exact path `npx create-lesto` / `lesto` take for an outsider who never touches bun
  # (the CLI runs the user's TS through jiti). Unlike `scaffold-loop` and `deploy-cloudflare-dry` (which
  # symlink the workspace `node_modules`, so prove nothing about resolution), this catches a package
  # missing from the publish closure, an undeclared dependency, or an eager import dragging an optional
  # subsystem into the default install. Needs Bun (to build/pack) AND Node (the outsider's runtime).
  install-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Set up Node 22 (the outsider's runtime — install + boot run under it)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pack → scaffold from tarballs → install + boot under node
        run: bun run test:pack-boot

  # The plain-node IMPORT proof: complements install-proof by proving every published package can be
  # `import`ed from a STANDARD consumer — plain node, no bun/jiti/bundler. `scripts/pack-and-import.mjs`
  # builds each package to `dist/`, packs the published (dist-pointing) shape, asserts no export target
  # is raw `.ts`/`.tsx` (Phase A), then `npm install`s + `import`s a node-safe subset under node (Phase
  # B). This catches the class of bug where shipping `exports → ./src/*.ts` makes a consumer's
  # `import "@lesto/x"` throw `ERR_UNSUPPORTED_NODE_MODULES_TYPE_STRIPPING` — which install-proof
  # (booting the CLI through jiti) is a false oracle for. Needs Bun (to build/pack) AND Node (consumer).
  import-proof:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Set up Node 22 (the consumer's runtime — install + import run under it)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build → pack (published shape) → import under plain node
        run: bun run test:pack-import
