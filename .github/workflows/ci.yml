name: CI

# The first CI gate for Keel. Blocking jobs (typecheck, lint, test) are green on
# the committed tree today; formatting runs informational-only because the
# content-* packages carry tracked, frozen formatting debt (see
# CONTENT_COVERAGE.md) that is ratcheted up in follow-up waves rather than gated
# here. Flip the format step to blocking once that debt is paid down.

on:
  push:
    branches: [main]
  pull_request:

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run ws:typecheck

      - name: Lint
        run: bun run lint

      # Coverage-gated: every package that declares a `test:cov` script is run
      # under v8 coverage and must meet its 100% lines/branches/functions/
      # statements threshold. Runs serially (see scripts/coverage-gate.ts) so the
      # gate is deterministic on a busy runner. Excludes the frozen content-*
      # baselines (no thresholds yet) and @keel/integration/e2e (no test:cov),
      # which run as their own steps below.
      - name: Test (coverage-gated)
        run: bun run ws:test:cov

      # The folded-in content-* suites carry tracked, frozen coverage debt
      # (see CONTENT_COVERAGE.md) and are not gated yet — run them without the
      # coverage threshold so their tests still execute on every PR.
      - name: Test (content packages, ungated)
        run: bun run --filter '@keel/content-*' test

      # @keel/integration is a cross-package journey suite with no src of its own
      # to cover, so it declares no thresholds and is excluded from the gate.
      - name: Test (integration)
        working-directory: packages/integration
        run: bun run test

      # Informational until the content-* formatting debt is paid down. The
      # framework packages are already clean; content-* is the only failing set.
      - name: Format check (informational)
        run: bun run ws:format:check
        continue-on-error: true

  # Browser E2E (Playwright) is a separate job: it needs a browser binary and
  # boots a real server, so it runs apart from the workspace unit/integration
  # tests. `keel-e2e` is named outside `@keel/*`, so `ws:test` above skips it.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: packages/e2e
        run: bunx playwright install --with-deps chromium

      - name: Browser E2E (island hydration)
        working-directory: packages/e2e
        run: bun run test:e2e
