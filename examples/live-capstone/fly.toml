# Fly.io config for the Tier-4 v1 capstone's LONG-LIVED prod host (ADR 0042 Inc8, `L-abe3f464`).
# See DEPLOY.md for the full runbook (this file is the runtime config; the Postgres + secrets are set
# out of band). Rename `app` and set `primary_region` before deploying.
#
# Build context MUST be the repo root (the capstone resolves @lesto/* from the workspace), so deploy
# from the repo root:
#   fly deploy --config examples/live-capstone/fly.toml --dockerfile examples/live-capstone/Dockerfile .

app = "lesto-live-capstone"
primary_region = "iad"

[build]
  # Path RELATIVE TO THE BUILD CONTEXT (the repo root, per the header). Spelled out in full so a bare
  # `fly deploy … .` without the `--dockerfile` flag can't silently build the repo-root framework
  # `Dockerfile` (a different, stateless-app image) instead of the capstone's.
  dockerfile = "examples/live-capstone/Dockerfile"

# A SINGLE-writer replication consumer must never run two machines at once (both would boot serve.ts's
# self-heal and drop each other's slot mid-stream — data corruption, not a scaling nuisance). A
# rolling/bluegreen/canary deploy boots a SECOND concurrent machine, so pin an in-place replace.
[deploy]
  strategy = "immediate"

# Non-secret config. LESTO_LIVE_PG_URL is a SECRET — set it with `fly secrets set`, never here:
#   fly secrets set LESTO_LIVE_PG_URL=postgres://…@…:5432/postgres   (a wal_level=logical Postgres)
[env]
  LESTO_LIVE_SOURCE = "pg"
  HOST = "0.0.0.0"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true

  # This app must run EXACTLY ONE machine (the single-writer slot — see the [deploy] note). NOTE: this
  # config does not *cap* the count — nothing in fly.toml can. The invariant is upheld by three things:
  # deploy with `--ha=false` (so the first deploy provisions one machine, not an HA pair), the
  # `[deploy] strategy = "immediate"` above (no second concurrent machine on a redeploy), and never
  # `fly scale count > 1`.
  #  - auto_stop_machines = "off": keep the demo always-on (a stopped consumer would take it down; the
  #    always-on behavior comes from THIS, not from min_machines_running, which is inert while off).
  #    serve.ts drops the slot on the SIGINT Fly sends by default (and on SIGTERM), so a deliberate
  #    stop still unpins WAL.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # Liveness: `/` serves the built index once the app is up. grace_period is generous because serve.ts
  # runs the pg bootstrap + first-snapshot BEFORE opening the port — a cold Postgres can take a while.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "60s"
    method = "GET"
    path = "/"

# A replication consumer + serving a ~1 MB bundle is light. One machine only (see the single-writer
# note above).
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
