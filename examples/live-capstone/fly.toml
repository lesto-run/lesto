# Fly.io config for the Tier-4 v1 capstone's LONG-LIVED prod host (ADR 0042 Inc8, `L-abe3f464`).
# See DEPLOY.md for the full runbook (this file is the runtime config; the Postgres + secrets are set
# out of band). Rename `app` and set `primary_region` before deploying.
#
# Build context MUST be the repo root (the capstone resolves @lesto/* from the workspace), so deploy
# from the repo root:
#   fly deploy --config examples/live-capstone/fly.toml --dockerfile examples/live-capstone/Dockerfile .

app = "lesto-live-capstone"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# Non-secret config. LESTO_LIVE_PG_URL is a SECRET — set it with `fly secrets set`, never here:
#   fly secrets set LESTO_LIVE_PG_URL=postgres://…@…:5432/postgres   (a wal_level=logical Postgres)
[env]
  LESTO_LIVE_SOURCE = "pg"
  HOST = "0.0.0.0"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true

  # A logical-replication slot is a SINGLE-WRITER resource: two machines would both try to
  # CREATE_REPLICATION_SLOT under the same name (and serve.ts's boot self-heal would have them drop
  # each other's slot) — so this app runs EXACTLY ONE machine. Never `fly scale count > 1`.
  #  - auto_stop_machines = "off": a stopped consumer would take the demo down; keep it always-on
  #    (serve.ts still drops the slot on the SIGTERM Fly sends, so a deliberate stop unpins WAL).
  #  - min_machines_running = 1: the one machine stays up.
  auto_stop_machines = "off"
  auto_start_machines = false
  min_machines_running = 1

  # Liveness: `/` serves the built index once the app is up.
  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "get"
    path = "/"

# A replication consumer + serving a ~1 MB bundle is light. One machine only (see the http_service
# note) — the single-instance constraint is enforced by `min_machines_running`/`fly scale count 1`.
[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
